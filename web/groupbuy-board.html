<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>恒奕美源数据看板</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #161a22;
        --muted: #6b7280;
        --subtle: #9aa3af;
        --line: #e1e6ee;
        --line-strong: #cfd7e4;
        --soft: #f3f6f8;
        --panel: #ffffff;
        --panel-soft: #f9faf7;
        --brand: #0f766e;
        --brand-strong: #0b5f59;
        --brand-soft: #e4f5ef;
        --commerce: #1f6f46;
        --warn: #b86b16;
        --ok: #16803c;
        --accent: #315c82;
        --sidebar: #111816;
        --sidebar-soft: #18231f;
        --white: #fff;
        --shadow: 0 18px 48px rgba(22, 26, 34, 0.08);
        --shadow-soft: 0 8px 24px rgba(22, 26, 34, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei",
          sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, #fbfcfa 0, #f3f6f8 240px),
          var(--soft);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 236px 1fr;
      }

      aside {
        position: sticky;
        top: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(31, 111, 70, 0.2), rgba(17, 24, 22, 0) 260px),
          var(--sidebar);
        color: var(--white);
        padding: 18px 14px;
      }

      .brand {
        display: grid;
        grid-template-columns: 38px 1fr;
        gap: 10px;
        align-items: center;
        padding: 4px 6px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: #d4f9e0;
        color: #10201f;
        font-weight: 850;
      }

      .brand-title {
        font-size: 17px;
        font-weight: 800;
        line-height: 1.15;
      }

      .brand-sub {
        margin-top: 4px;
        color: rgba(255, 255, 255, 0.66);
        font-size: 12px;
      }

      .page-nav {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .page-tab {
        width: 100%;
        height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 12px;
        text-align: left;
        color: rgba(255, 255, 255, 0.72);
        background: transparent;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      .page-tab:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--white);
      }

      .page-tab.active {
        color: #10201f;
        background: #d4f9e0;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      }

      .main {
        min-width: 0;
      }

      header {
        background: rgba(255, 255, 255, 0.86);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(16px);
      }

      .topbar,
      main {
        width: min(1280px, calc(100vw - 300px));
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 0;
      }

      .top-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      h1 {
        margin: 0;
        font-size: 23px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .sub {
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
      }

      button,
      input {
        height: 38px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--white);
        color: var(--ink);
        font: inherit;
      }

      input {
        transition:
          border-color 0.18s ease,
          box-shadow 0.18s ease,
          background 0.18s ease;
      }

      input:focus {
        outline: 0;
        border-color: #83b5a7;
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
      }

      .primary {
        padding: 0 16px;
        border-color: var(--brand);
        border-radius: 8px;
        background: linear-gradient(180deg, #128278, var(--brand-strong));
        color: var(--white);
        cursor: pointer;
        font-weight: 700;
        box-shadow: 0 8px 18px rgba(15, 118, 110, 0.18);
      }

      .primary:hover {
        background: linear-gradient(180deg, #159185, #0b5f59);
      }

      .primary:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .secondary {
        display: inline-grid;
        place-items: center;
        height: 38px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--muted);
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
      }

      .secondary:hover {
        border-color: var(--line-strong);
        color: var(--ink);
      }

      .ghost-button {
        display: inline-grid;
        place-items: center;
        width: auto;
        height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--brand-strong);
        cursor: pointer;
        font-size: 13px;
        font-weight: 750;
      }

      .ghost-button:hover {
        border-color: #9ccfc2;
        background: #f4fbf8;
      }

      .ghost-button:disabled {
        color: #a5adb8;
        cursor: not-allowed;
        background: #f3f6f8;
      }

      main {
        padding: 20px 0 36px;
      }

      .page {
        display: none;
      }

      .page.active {
        display: block;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
      }

      #bindingMetrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 150px 150px auto;
        gap: 12px;
        align-items: end;
        margin-bottom: 14px;
        padding: 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow-soft);
      }

      .field label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .metric {
        position: relative;
        overflow: hidden;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        min-height: 94px;
        box-shadow: var(--shadow-soft);
      }

      .metric::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 3px;
        background: var(--brand);
      }

      .metric:nth-child(2)::before {
        background: var(--accent);
      }

      .metric:nth-child(4)::before {
        background: var(--commerce);
      }

      .metric:nth-child(5)::before,
      .metric:nth-child(6)::before {
        background: var(--warn);
      }

      .metric .label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .metric .value {
        margin-top: 12px;
        font-size: 25px;
        font-weight: 800;
        line-height: 1;
      }

      .metric-parts,
      .binding-stats {
        display: flex;
        align-items: baseline;
        gap: 4px;
      }

      .metric-parts {
        margin-top: 12px;
      }

      .metric-main,
      .binding-main {
        color: var(--ink);
        font-weight: 850;
        line-height: 1;
      }

      .metric-main {
        font-size: 26px;
      }

      .binding-main {
        font-size: 18px;
      }

      .metric-sub,
      .binding-sub {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .segmented {
        display: inline-flex;
        gap: 4px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f5f8f7;
      }

      .segmented button {
        width: auto;
        height: 30px;
        padding: 0 10px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 800;
      }

      .segmented button.active {
        background: #fff;
        color: var(--brand-strong);
        box-shadow: 0 1px 4px rgba(21, 26, 32, 0.08);
      }

      .metric.loading::before {
        background: #d6e5dd;
      }

      .skeleton-line {
        display: block;
        position: relative;
        overflow: hidden;
        height: 12px;
        border-radius: 999px;
        background: #edf2f0;
      }

      .skeleton-line.wide {
        width: 74%;
      }

      .skeleton-line.value {
        width: 58%;
        height: 26px;
        margin-top: 14px;
      }

      .skeleton-line::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.72), transparent);
        animation: shimmer 1.25s infinite;
      }

      @keyframes shimmer {
        100% {
          transform: translateX(100%);
        }
      }

      section {
        margin-top: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .section-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 64px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #fff, #fbfcfe);
      }

      h2 {
        margin: 0;
        font-size: 16px;
        letter-spacing: 0;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .tabs {
        display: grid;
        align-content: start;
        gap: 7px;
        padding: 12px;
        border-right: 1px solid var(--line);
        background: var(--panel-soft);
      }

      .tab {
        width: 100%;
        height: 38px;
        padding: 0 12px;
        border-radius: 8px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-weight: 700;
        text-align: left;
      }

      .tab:hover {
        background: #eef3f1;
        color: var(--ink);
      }

      .tab.active {
        border-color: #b7d8d4;
        background: var(--brand-soft);
        color: var(--brand-strong);
        box-shadow: inset 3px 0 0 var(--brand);
      }

      .board-shell {
        display: grid;
        grid-template-columns: 164px minmax(0, 1fr);
        min-height: 420px;
        min-width: 0;
      }

      .board-shell > div {
        min-width: 0;
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.active {
        display: block;
        min-width: 0;
      }

      .leader-list {
        padding: 6px 10px;
      }

      .leader {
        display: grid;
        grid-template-columns: 34px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px 8px;
        border-bottom: 1px solid #edf1f5;
      }

      .leader:hover {
        background: #fbfcfe;
      }

      .leader:last-child {
        border-bottom: 0;
      }

      .rank {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        background: #e7f5f2;
        color: var(--brand-strong);
        font-weight: 800;
      }

      .name {
        font-weight: 750;
      }

      .meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .remain {
        text-align: right;
        color: var(--warn);
        font-weight: 800;
      }

      .remain span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        margin-top: 3px;
      }

      .toolbar {
        padding: 12px 18px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfe;
      }

      input {
        width: 100%;
        padding: 0 10px;
      }

      input[type="date"] {
        min-width: 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #edf1f5;
        text-align: left;
        font-size: 13px;
        vertical-align: top;
        overflow-wrap: anywhere;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        background: #f6f8fb;
      }

      tbody tr:hover td {
        background: #fbfcfe;
      }

      .empty,
      .error {
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }

      .error {
        color: #b42318;
      }

      .session-fix {
        margin: 0 auto 18px;
        padding: 16px;
        max-width: 760px;
        border: 1px solid #f1c7c0;
        border-radius: 8px;
        background: #fff7f5;
        color: #7a271a;
        text-align: left;
      }

      .session-fix strong {
        display: block;
        margin-bottom: 8px;
        color: #912018;
        font-size: 14px;
      }

      .session-fix textarea {
        width: 100%;
        min-height: 76px;
        margin: 12px 0 10px;
        padding: 10px 12px;
        border: 1px solid #f1c7c0;
        border-radius: 8px;
        resize: vertical;
        color: var(--ink);
        font: inherit;
        line-height: 1.5;
      }

      .session-fix button {
        width: auto;
        height: 36px;
        padding: 0 14px;
        border: 1px solid var(--brand);
        border-radius: 8px;
        background: var(--brand);
        color: #fff;
        cursor: pointer;
        font-weight: 800;
      }

      .session-fix button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .session-fix .hint {
        color: #9f4a3f;
        font-size: 12px;
        line-height: 1.6;
      }

      .notice {
        margin-bottom: 14px;
        padding: 12px 14px;
        border: 1px solid #f3d19a;
        border-radius: 8px;
        background: #fff8eb;
        color: #8a4b0f;
        font-size: 13px;
        line-height: 1.6;
      }

      .pager {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        padding: 12px 18px;
        border-top: 1px solid var(--line);
        background: #fbfcfe;
        color: var(--muted);
        font-size: 12px;
      }

      .pager button {
        width: auto;
        height: 32px;
        padding: 0 10px;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font-weight: 700;
      }

      .pager button:disabled {
        color: #a5adb8;
        cursor: not-allowed;
        background: #f3f6f8;
      }

      .loading-state {
        display: grid;
        place-items: center;
        gap: 10px;
        min-height: 180px;
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }

      .loading-spinner {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 3px solid #dbe7e2;
        border-top-color: var(--brand);
        animation: spin 0.85s linear infinite;
      }

      .loading-title {
        color: var(--ink);
        font-weight: 800;
      }

      .loading-copy {
        font-size: 12px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 960px) {
        .app {
          grid-template-columns: 1fr;
        }

        aside {
          position: sticky;
          top: 0;
          z-index: 10;
          min-height: auto;
          padding: 10px;
        }

        .brand {
          display: none;
        }

        .page-nav {
          display: flex;
          margin-top: 0;
        }

        .page-tab {
          text-align: center;
        }

        .topbar,
        main {
          width: min(100vw - 24px, 1240px);
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        #bindingMetrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .filters {
          grid-template-columns: 1fr 1fr;
        }

        .board-shell {
          grid-template-columns: 1fr;
          min-height: 0;
        }

        .tabs {
          display: flex;
          flex-direction: row;
          align-items: center;
          border-right: 0;
          border-bottom: 1px solid var(--line);
          overflow-x: auto;
          min-height: 51px;
        }

        .tab {
          flex: 0 0 auto;
          width: auto;
          text-align: center;
        }
      }

      @media (max-width: 640px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        #bindingMetrics {
          grid-template-columns: 1fr;
        }

        .filters {
          grid-template-columns: 1fr;
        }

        table {
          min-width: 780px;
        }

        .table-scroll {
          overflow-x: auto;
        }
      }

      @media (max-width: 360px) {
        .metrics {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <div class="brand">
          <div class="brand-mark">HY</div>
          <div>
            <div class="brand-title">恒奕美源</div>
            <div class="brand-sub">商户数据后台</div>
          </div>
        </div>
        <nav class="page-nav" aria-label="页面切换">
          <button class="page-tab active" type="button" data-page="groupbuy">拼团订单</button>
          <button class="page-tab" type="button" data-page="binding">绑定数据</button>
        </nav>
      </aside>

      <div class="main">
        <header>
          <div class="topbar">
            <div>
              <h1 id="pageTitle">恒奕美源拼团订单看板</h1>
              <div class="sub" id="subtitle">正在读取本月拼团数据</div>
            </div>
            <div class="top-actions">
              <button class="primary" id="refreshBtn" type="button">刷新数据</button>
              <a class="secondary" href="/logout">退出登录</a>
            </div>
          </div>
        </header>

        <main>
          <div class="page active" id="page-groupbuy">
            <div class="filters" aria-label="拼团筛选">
              <div class="field">
                <label for="productSearchInput">拼团商品名</label>
                <input id="productSearchInput" placeholder="全部拼团商品" />
              </div>
              <div class="field">
                <label for="beginDateInput">开始日期</label>
                <input id="beginDateInput" type="date" />
              </div>
              <div class="field">
                <label for="endDateInput">结束日期</label>
                <input id="endDateInput" type="date" />
              </div>
              <button class="primary" id="applyGroupbuyFilterBtn" type="button">查询</button>
            </div>

            <div class="metrics" id="groupbuyMetrics"></div>
            <div id="groupbuyNotice"></div>

            <section>
              <div class="board-shell">
                <div class="tabs" role="tablist" aria-label="拼团榜单切换">
                  <button class="tab active" type="button" data-tab="spu">拼团汇总</button>
                  <button class="tab" type="button" data-tab="success">已成团</button>
                  <button class="tab" type="button" data-tab="detail">未成团</button>
                </div>

                <div>
                  <div class="tab-panel active" id="panel-spu">
                    <div class="section-head">
                      <div>
                        <h2>拼团汇总</h2>
                        <div class="hint" id="spuHint">按拼团商品名汇总本月全部拼团订单</div>
                      </div>
                    </div>
                    <div class="table-scroll">
                      <table>
                        <thead>
                          <tr>
                            <th>拼团商品名</th>
                            <th style="width: 92px">开团数</th>
                            <th style="width: 92px">订单数</th>
                            <th style="width: 108px">金额</th>
                            <th style="width: 92px">已成团</th>
                            <th style="width: 92px">未成团</th>
                            <th style="width: 92px">成团率</th>
                          </tr>
                        </thead>
                        <tbody id="spuRows"></tbody>
                      </table>
                    </div>
                  </div>

                  <div class="tab-panel" id="panel-success">
                    <div class="section-head">
                      <div>
                        <h2>已成团列表</h2>
                        <div class="hint" id="successHint">显示当前范围内已成团团长</div>
                      </div>
                      <button class="ghost-button" id="exportSuccessBtn" type="button">导出 Excel</button>
                    </div>
                    <div class="leader-list" id="successList"></div>
                    <div class="pager" id="successPager"></div>
                  </div>

                  <div class="tab-panel" id="panel-detail">
                    <div class="section-head">
                      <div>
                        <h2>未成团</h2>
                        <div class="hint" id="detailHint">支持按团长、手机号、标题搜索</div>
                      </div>
                      <button class="ghost-button" id="exportPendingBtn" type="button">导出 Excel</button>
                    </div>
                    <div class="toolbar">
                      <input id="searchInput" placeholder="搜索团长 / 手机号 / 标题" />
                    </div>
                    <div class="leader-list" id="detailRows"></div>
                    <div class="pager" id="detailPager"></div>
                  </div>
                </div>
              </div>
            </section>
          </div>

          <div class="page" id="page-binding">
            <div class="metrics" id="bindingMetrics"></div>
            <div id="bindingNotice"></div>

            <section>
              <div class="section-head">
                <div>
                  <h2>合伙人绑定数据</h2>
                  <div class="hint" id="bindingHint">默认按今日绑定总数降序，每页 20 条</div>
                </div>
                <div class="segmented" aria-label="绑定数据排序">
                  <button class="active" type="button" data-binding-sort="today">今日</button>
                  <button type="button" data-binding-sort="yesterday">昨日</button>
                  <button type="button" data-binding-sort="cumulative">累计</button>
                </div>
              </div>
              <div class="table-scroll">
                <table>
                  <thead>
                    <tr>
                      <th style="width: 72px">排名</th>
                      <th>合伙人</th>
                      <th style="width: 210px">累计</th>
                      <th style="width: 210px">昨日</th>
                      <th style="width: 210px">今日</th>
                    </tr>
                  </thead>
                  <tbody id="bindingRows"></tbody>
                </table>
              </div>
              <div class="pager" id="bindingPager"></div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script>
      const state = {
        activePage: "groupbuy",
        groupbuy: null,
        binding: null,
        groupbuyFilters: {
          keyword: "",
          beginDate: "",
          endDate: ""
        },
        groupbuyQuery: "",
        groupbuyTab: "spu",
        successPage: 1,
        pendingPage: 1,
        bindingPage: 1,
        bindingSort: "today",
        pageSize: 20
      };

      const $ = (id) => document.getElementById(id);
      const money = (value) => `¥${Number(value || 0).toFixed(2)}`;
      const pct = (value) => `${(Number(value || 0) * 100).toFixed(1)}%`;
      const escapeHtml = (value) =>
        String(value || "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[char]);
      const dateKey = (date) =>
        [date.getFullYear(), String(date.getMonth() + 1).padStart(2, "0"), String(date.getDate()).padStart(2, "0")].join("-");
      const exportLabels = {
        groupId: "拼团ID",
        leaderName: "团长",
        leaderPhone: "团长手机号",
        leaderPhoneMasked: "团长手机号脱敏",
        title: "拼团商品名",
        createdAt: "开团时间",
        targetCount: "成团目标单数",
        joinedCount: "参团单数",
        paidOrders: "有效订单数",
        amount: "有效金额",
        remaining: "还差单数",
        isSuccess: "是否已成团",
        rawStatus: "原始状态"
      };

      function currentMonthRange() {
        const now = new Date();
        return {
          beginDate: dateKey(new Date(now.getFullYear(), now.getMonth(), 1)),
          endDate: dateKey(now)
        };
      }

      function metric(label, value) {
        return `<div class="metric"><div class="label">${label}</div><div class="value">${value}</div></div>`;
      }

      function bindingStats(input) {
        return {
          totalBindings: Number(input?.totalBindings || 0),
          phoneObtained: Number(input?.phoneObtained || 0),
          phoneMissing: Number(input?.phoneMissing || 0)
        };
      }

      function metricGroup(label, stats) {
        const value = bindingStats(stats);
        return `
          <div class="metric">
            <div class="label">${label}</div>
            <div class="metric-parts">
              <span class="metric-main">${value.totalBindings}</span>
              <span class="metric-sub">（${value.phoneObtained}/${value.phoneMissing}）</span>
            </div>
          </div>
        `;
      }

      function bindingStatCell(stats) {
        const value = bindingStats(stats);
        return `
          <div class="binding-stats">
            <span class="binding-main">${value.totalBindings}</span>
            <span class="binding-sub">（${value.phoneObtained}/${value.phoneMissing}）</span>
          </div>
        `;
      }

      function loadingMetric() {
        return '<div class="metric loading"><span class="skeleton-line wide"></span><span class="skeleton-line value"></span></div>';
      }

      function loadingState(title = "数据正在加载中", copy = "正在连接数据源并计算当前筛选范围，请稍等") {
        return `
          <div class="loading-state">
            <div class="loading-spinner" aria-hidden="true"></div>
            <div>
              <div class="loading-title">${title}</div>
              <div class="loading-copy">${copy}</div>
            </div>
          </div>
        `;
      }

      function pageRows(rows, page) {
        const start = (page - 1) * state.pageSize;
        return rows.slice(start, start + state.pageSize);
      }

      function renderPager(id, rows, page, type) {
        const totalPages = Math.max(1, Math.ceil(rows.length / state.pageSize));
        const safePage = Math.min(Math.max(page, 1), totalPages);
        $(id).innerHTML = rows.length > state.pageSize
          ? `
              <span>第 ${safePage} / ${totalPages} 页，共 ${rows.length} 条</span>
              <button type="button" data-page-action="${type}:prev" ${safePage <= 1 ? "disabled" : ""}>上一页</button>
              <button type="button" data-page-action="${type}:next" ${safePage >= totalPages ? "disabled" : ""}>下一页</button>
            `
          : "";
        return safePage;
      }

      function renderGroupbuyLoading() {
        $("groupbuyMetrics").innerHTML = Array.from({ length: 6 }, loadingMetric).join("");
        $("spuHint").textContent = "正在读取拼团订单并按商品汇总";
        $("successHint").textContent = "正在读取当前范围内已成团团长";
        $("detailHint").textContent = "正在读取未成团";
        $("spuRows").innerHTML = `<tr><td colspan="7">${loadingState()}</td></tr>`;
        $("successList").innerHTML = loadingState("已成团列表加载中", "正在统计当前范围内成团记录");
        $("successPager").innerHTML = "";
        $("detailRows").innerHTML = loadingState("未成团加载中", "正在整理团长、手机号和商品标题");
        $("detailPager").innerHTML = "";
      }

      function renderBindingLoading() {
        $("bindingMetrics").innerHTML = Array.from({ length: 3 }, loadingMetric).join("");
        $("bindingHint").textContent = "正在读取合伙人绑定数据";
        $("bindingRows").innerHTML = `<tr><td colspan="5">${loadingState("绑定数据加载中", "正在按合伙人汇总累计、昨日和今日数据")}</td></tr>`;
        $("bindingPager").innerHTML = "";
      }

      function renderGroupbuyMetrics(board) {
        $("groupbuyMetrics").innerHTML = [
          metric("有效订单", `${board.summary.totalOrders} 单`),
          metric("有效金额", money(board.summary.totalAmount)),
          metric("开团数", `${board.summary.totalGroups} 个`),
          metric("已成团", `${board.summary.successGroups} 个`),
          metric("未成团", `${board.summary.pendingGroups} 个`),
          metric("成团率", pct(board.summary.successRate))
        ].join("");
      }

      function renderBindingMetrics(board) {
        $("bindingMetrics").innerHTML = [
          metricGroup("累计", board.cumulative),
          metricGroup("昨日", board.yesterday),
          metricGroup("今日", board.today)
        ].join("");
      }

      function renderSpuGroups(board) {
        const rows = board.spuGroups || [];
        const keyword = board.keyword ? `，商品名包含“${board.keyword}”` : "，全部拼团商品";
        $("spuHint").textContent = `当前显示 ${rows.length} 个拼团商品，统计范围 ${board.reportDate}${keyword}`;
        if (rows.length === 0) {
          $("spuRows").innerHTML = '<tr><td colspan="7"><div class="empty">没有匹配的拼团商品</div></td></tr>';
          return;
        }
        $("spuRows").innerHTML = rows
          .map(
            (item) => `
              <tr>
                <td>${item.title || "未命名拼团商品"}</td>
                <td>${item.totalGroups}</td>
                <td>${item.totalOrders}</td>
                <td>${money(item.totalAmount)}</td>
                <td>${item.successGroups}</td>
                <td>${item.pendingGroups}</td>
                <td>${pct(item.successRate)}</td>
              </tr>
            `
          )
          .join("");
      }

      function leaderRow(item, index, rightHtml, metaHtml) {
        return `
          <div class="leader">
            <div class="rank">${index + 1}</div>
            <div>
              <div class="name">${item.leaderName || item.name}</div>
              <div class="meta">${metaHtml}</div>
            </div>
            <div class="remain">${rightHtml}</div>
          </div>
        `;
      }

      function renderSuccessList(board) {
        const rows = board.succeeded || [];
        state.successPage = renderPager("successPager", rows, state.successPage, "success");
        const visibleRows = pageRows(rows, state.successPage);
        $("successHint").textContent = `当前已成团 ${rows.length} 个，每页 20 条`;
        if (rows.length === 0) {
          $("successList").innerHTML = '<div class="empty">当前范围暂无已成团数据</div>';
          return;
        }
        $("successList").innerHTML = visibleRows
          .map((item, index) =>
            leaderRow(
              item,
              (state.successPage - 1) * state.pageSize + index,
              `已成团<span>${item.title || "拼团商品"}</span>`,
              `${item.leaderPhoneMasked} ｜ 有效 ${item.paidOrders} 单 ｜ ${money(item.amount)}`
            )
          )
          .join("");
      }

      function filteredPendingRows() {
        const board = state.groupbuy;
        if (!board) return [];
        const q = state.groupbuyQuery.trim().toLowerCase();
        return (board.pending || []).filter((item) => {
          const text = `${item.leaderName} ${item.leaderPhone} ${item.leaderPhoneMasked} ${item.title}`.toLowerCase();
          return !q || text.includes(q);
        });
      }

      function renderPendingDetail() {
        const rows = filteredPendingRows();
        state.pendingPage = renderPager("detailPager", rows, state.pendingPage, "pending");
        const visibleRows = pageRows(rows, state.pendingPage);
        $("detailHint").textContent = `当前共 ${rows.length} 条未成团，支持按团长、手机号、标题搜索`;
        if (rows.length === 0) {
          $("detailRows").innerHTML = '<div class="empty">没有匹配的数据</div>';
          return;
        }
        $("detailRows").innerHTML = visibleRows
          .map((item, index) =>
            leaderRow(
              item,
              (state.pendingPage - 1) * state.pageSize + index,
              `${item.remaining} 单<span>还差</span>`,
              `${escapeHtml(item.leaderPhoneMasked)} ｜ 有效 ${item.paidOrders} 单 ｜ ${money(item.amount)} ｜ ${escapeHtml(item.createdAt || "未知")} ｜ ${escapeHtml(item.title || "未命名活动")}`
            )
          )
          .join("");
      }

      function flattenForExport(value, prefix = "", output = {}) {
        if (Array.isArray(value)) {
          if (value.length === 0) {
            output[prefix] = "";
            return output;
          }
          value.forEach((item, index) => flattenForExport(item, `${prefix}.${index + 1}`, output));
          return output;
        }
        if (value && typeof value === "object") {
          Object.entries(value).forEach(([key, item]) => {
            const nextKey = prefix ? `${prefix}.${key}` : key;
            flattenForExport(item, nextKey, output);
          });
          return output;
        }
        output[prefix] = value ?? "";
        return output;
      }

      function exportableRows(rows) {
        return rows.map((row, index) => ({
          序号: index + 1,
          ...flattenForExport(row)
        }));
      }

      function exportColumnLabel(key) {
        if (key === "序号") return key;
        const parts = key.split(".");
        const first = parts.shift();
        return [exportLabels[first] || first, ...parts].join(".");
      }

      function excelCell(value) {
        if (typeof value === "boolean") return value ? "是" : "否";
        if (typeof value === "number") return String(value);
        return escapeHtml(value);
      }

      function downloadExcel(filename, sheetName, rows) {
        if (!rows.length) {
          window.alert("当前没有可导出的数据。");
          return;
        }
        const flattenedRows = exportableRows(rows);
        const columns = [...new Set(flattenedRows.flatMap((row) => Object.keys(row)))];
        const table = `
          <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel">
            <head>
              <meta charset="utf-8" />
              <style>
                table { border-collapse: collapse; }
                th, td { border: 1px solid #d9e2ec; padding: 6px 8px; mso-number-format:"\\@"; }
                th { background: #eef6f4; font-weight: bold; }
              </style>
            </head>
            <body>
              <table>
                <thead><tr>${columns.map((key) => `<th>${escapeHtml(exportColumnLabel(key))}</th>`).join("")}</tr></thead>
                <tbody>
                  ${flattenedRows
                    .map((row) => `<tr>${columns.map((key) => `<td>${excelCell(row[key])}</td>`).join("")}</tr>`)
                    .join("")}
                </tbody>
              </table>
            </body>
          </html>
        `;
        const blob = new Blob(["\ufeff", table], { type: "application/vnd.ms-excel;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${filename}-${sheetName}-${dateKey(new Date())}.xls`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
      }

      function exportGroupbuyRows(type) {
        const board = state.groupbuy;
        if (!board) {
          window.alert("数据还没有加载完成。");
          return;
        }
        if (type === "success") {
          downloadExcel("恒奕美源拼团", "已成团", board.succeeded || []);
          return;
        }
        downloadExcel("恒奕美源拼团", "未成团", filteredPendingRows());
      }

      function renderBindingTop(board) {
        const sortLabels = { today: "今日", yesterday: "昨日", cumulative: "累计" };
        const rows = [...(board.partners || board.topPartners || [])].sort((a, b) => {
          const aPrimary = bindingStats(a[state.bindingSort] || a).totalBindings;
          const bPrimary = bindingStats(b[state.bindingSort] || b).totalBindings;
          const aCumulative = bindingStats(a.cumulative || a).totalBindings;
          const bCumulative = bindingStats(b.cumulative || b).totalBindings;
          const aToday = bindingStats(a.today).totalBindings;
          const bToday = bindingStats(b.today).totalBindings;
          return bPrimary - aPrimary || bToday - aToday || bCumulative - aCumulative;
        });
        state.bindingPage = renderPager("bindingPager", rows, state.bindingPage, "binding");
        const visibleRows = pageRows(rows, state.bindingPage);
        $("bindingHint").textContent = `当前共 ${rows.length} 位合伙人，按${sortLabels[state.bindingSort]}绑定总数降序，每页 20 条`;
        document.querySelectorAll("[data-binding-sort]").forEach((button) => {
          button.classList.toggle("active", button.dataset.bindingSort === state.bindingSort);
        });
        if (rows.length === 0) {
          $("bindingRows").innerHTML = '<tr><td colspan="5"><div class="empty">暂无合伙人绑定数据</div></td></tr>';
          return;
        }
        $("bindingRows").innerHTML = visibleRows
          .map((item, index) => {
            const rank = (state.bindingPage - 1) * state.pageSize + index + 1;
            const cumulative = item.cumulative || item;
            const yesterday = item.yesterday || {};
            const today = item.today || {};
            return `
              <tr>
                <td>${rank}</td>
                <td>${escapeHtml(item.name || "未命名合伙人")}</td>
                <td>${bindingStatCell(cumulative)}</td>
                <td>${bindingStatCell(yesterday)}</td>
                <td>${bindingStatCell(today)}</td>
              </tr>
            `;
          }
          )
          .join("");
      }

      function renderGroupbuy(board) {
        state.groupbuy = board;
        if (board.filters) {
          state.groupbuyFilters = {
            keyword: board.filters.keyword || "",
            beginDate: board.filters.beginDate || state.groupbuyFilters.beginDate,
            endDate: board.filters.endDate || state.groupbuyFilters.endDate
          };
          $("productSearchInput").value = state.groupbuyFilters.keyword;
          $("beginDateInput").value = state.groupbuyFilters.beginDate;
          $("endDateInput").value = state.groupbuyFilters.endDate;
        }
        $("groupbuyNotice").innerHTML = "";
        renderGroupbuyMetrics(board);
        renderSpuGroups(board);
        renderSuccessList(board);
        renderPendingDetail();
        renderInnerTabs();
      }

      function renderBinding(board) {
        state.binding = board;
        $("bindingNotice").innerHTML = "";
        renderBindingMetrics(board);
        renderBindingTop(board);
      }

      function renderShell() {
        document.querySelectorAll(".page-tab").forEach((button) => {
          button.classList.toggle("active", button.dataset.page === state.activePage);
        });
        document.querySelectorAll(".page").forEach((page) => {
          page.classList.toggle("active", page.id === `page-${state.activePage}`);
        });
        $("pageTitle").textContent =
          state.activePage === "groupbuy" ? "恒奕美源拼团订单看板" : "恒奕美源绑定数据看板";
        const board = state.activePage === "groupbuy" ? state.groupbuy : state.binding;
        $("subtitle").textContent = board
          ? `日期：${board.reportDate} ｜ 统计截止：${board.generatedAtText}`
          : "正在读取本月拼团数据";
      }

      function renderInnerTabs() {
        document.querySelectorAll(".tab").forEach((button) => {
          button.classList.toggle("active", button.dataset.tab === state.groupbuyTab);
        });
        document.querySelectorAll(".tab-panel").forEach((panel) => {
          panel.classList.toggle("active", panel.id === `panel-${state.groupbuyTab}`);
        });
      }

      async function fetchJson(path) {
        const requestUrl = new URL(path, location.origin);
        requestUrl.searchParams.set("_refresh", String(Date.now()));
        const response = await fetch(requestUrl.toString(), { cache: "no-store" });
        if (response.status === 401) {
          location.href = "/login";
          throw new Error("登录已过期，请重新登录。");
        }
        let data;
        try {
          data = await response.json();
        } catch {
          throw new Error("服务返回内容异常，请检查 Node 服务是否仍在运行。");
        }
        if (!response.ok) throw new Error(data.error || "读取失败");
        return data;
      }

      function isGroupbuySessionError(message) {
        return /GROUPBUY_SESSION_TOKEN|session_token|授权.*过期|授权未配置|登录状态校验失败/.test(String(message || ""));
      }

      function renderSessionFix() {
        return `
          <div class="session-fix">
            <strong>拼团数据正在维护</strong>
            <div>拼团后台授权已失效，系统已停止展示旧数据。请联系管理员处理。</div>
            <div class="hint">绑定数据和已登录状态不受影响，恢复后刷新页面即可继续查看拼团数据。</div>
          </div>
        `;
      }

      function groupbuyApiPath() {
        const params = new URLSearchParams();
        if (state.groupbuyFilters.keyword) params.set("keyword", state.groupbuyFilters.keyword);
        if (state.groupbuyFilters.beginDate) params.set("begin_date", state.groupbuyFilters.beginDate);
        if (state.groupbuyFilters.endDate) params.set("end_date", state.groupbuyFilters.endDate);
        const query = params.toString();
        return query ? `/api/groupbuy?${query}` : "/api/groupbuy";
      }

      async function refresh() {
        const button = $("refreshBtn");
        button.disabled = true;
        button.textContent = "刷新中";
        if (state.activePage === "groupbuy") {
          renderGroupbuyLoading();
        } else {
          renderBindingLoading();
        }
        try {
          if (state.activePage === "groupbuy") {
            renderGroupbuy(await fetchJson(groupbuyApiPath()));
          } else {
            renderBinding(await fetchJson("/api/binding"));
          }
          renderShell();
        } catch (error) {
          const isSessionError = isGroupbuySessionError(error.message || error);
          const message = isSessionError ? "拼团数据正在维护，请联系管理员处理。" : (error.message || error);
          const text = `<div class="error">${escapeHtml(message)}</div>`;
          if (state.activePage === "groupbuy") {
            const sessionFix = isSessionError ? renderSessionFix() : "";
            $("groupbuyNotice").innerHTML = sessionFix || text;
            $("spuRows").innerHTML = `<tr><td colspan="7">${text}</td></tr>`;
            $("successList").innerHTML = text;
            $("successPager").innerHTML = "";
            $("detailRows").innerHTML = text;
            $("detailPager").innerHTML = "";
          } else {
            $("bindingNotice").innerHTML = text;
            $("bindingRows").innerHTML = `<tr><td colspan="5">${text}</td></tr>`;
            $("bindingPager").innerHTML = "";
          }
        } finally {
          button.disabled = false;
          button.textContent = "刷新数据";
        }
      }

      async function switchPage(page) {
        state.activePage = page;
        renderShell();
        if ((page === "groupbuy" && !state.groupbuy) || (page === "binding" && !state.binding)) {
          await refresh();
        }
      }

      $("refreshBtn").addEventListener("click", refresh);
      $("exportSuccessBtn").addEventListener("click", () => exportGroupbuyRows("success"));
      $("exportPendingBtn").addEventListener("click", () => exportGroupbuyRows("pending"));
      $("searchInput").addEventListener("input", (event) => {
        state.groupbuyQuery = event.target.value;
        state.pendingPage = 1;
        renderPendingDetail();
      });
      $("productSearchInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") $("applyGroupbuyFilterBtn").click();
      });
      $("applyGroupbuyFilterBtn").addEventListener("click", () => {
        state.groupbuyFilters = {
          keyword: $("productSearchInput").value.trim(),
          beginDate: $("beginDateInput").value,
          endDate: $("endDateInput").value
        };
        state.successPage = 1;
        state.pendingPage = 1;
        refresh();
      });
      document.addEventListener("click", (event) => {
        const action = event.target?.dataset?.pageAction;
        if (!action) return;
        const [type, direction] = action.split(":");
        if (type === "pending") {
          state.pendingPage += direction === "next" ? 1 : -1;
          renderPendingDetail();
        }
        if (type === "success") {
          state.successPage += direction === "next" ? 1 : -1;
          renderSuccessList(state.groupbuy);
        }
        if (type === "binding") {
          state.bindingPage += direction === "next" ? 1 : -1;
          renderBindingTop(state.binding);
        }
      });
      document.querySelectorAll("[data-binding-sort]").forEach((button) => {
        button.addEventListener("click", () => {
          state.bindingSort = button.dataset.bindingSort;
          state.bindingPage = 1;
          if (state.binding) renderBindingTop(state.binding);
        });
      });
      document.querySelectorAll(".page-tab").forEach((button) => {
        button.addEventListener("click", () => switchPage(button.dataset.page));
      });
      document.querySelectorAll(".tab").forEach((button) => {
        button.addEventListener("click", () => {
          state.groupbuyTab = button.dataset.tab;
          renderInnerTabs();
        });
      });

      Object.assign(state.groupbuyFilters, currentMonthRange());
      $("beginDateInput").value = state.groupbuyFilters.beginDate;
      $("endDateInput").value = state.groupbuyFilters.endDate;
      refresh();
    </script>
  </body>
</html>
